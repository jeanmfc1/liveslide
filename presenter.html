  const QUESTIONS = [
    {
      id: "q1",

      options: ["⭐ Poor", "⭐⭐ Fair", "⭐⭐⭐ Good", "⭐⭐⭐⭐ Great", "⭐⭐⭐⭐⭐ Excellent"]

</script>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<!-- QR Code -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg:      #06080f;
  --card:    #0c1525;
  --border:  #1a2840;
  --accent:  #00d4ff;
  --accent2: #7c6fea;
  --green:   #3ddc97;
  --amber:   #f59e0b;
  --rose:    #f43f5e;
  --text:    #e8f0fe;
  --muted:   #3a5570;
  --light:   #7a9ab5;
  --mono: 'JetBrains Mono', monospace;
  --disp: 'Syne', sans-serif;
  --body: 'DM Sans', sans-serif;
}

html, body {
  width:100%; height:100%; overflow:hidden;
  font-family:var(--body);
  background:var(--bg);
  color:var(--text);
}

body {
  display:flex; flex-direction:column;
  background: radial-gradient(ellipse 120% 80% at 50% -10%, #0c1e38 0%, var(--bg) 65%);
  position:relative;
}

/* Grid lines */
body::before {
  content:''; position:absolute; inset:0; pointer-events:none; z-index:0;
  background-image:
    linear-gradient(rgba(0,212,255,.018) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,255,.018) 1px, transparent 1px);
  background-size:56px 56px;
}

/* ── HEADER ── */
header {
  display:flex; align-items:center; justify-content:space-between;
  padding:10px 18px 8px;
  border-bottom:1px solid var(--border);
  position:relative; z-index:1; flex-shrink:0;
}

.header-left { display:flex; align-items:center; gap:10px; }

.live-badge {
  display:flex; align-items:center; gap:6px;
  font-family:var(--mono); font-size:11px; color:var(--accent);
  background:rgba(0,212,255,.08); padding:3px 9px;
  border-radius:20px; border:1px solid rgba(0,212,255,.2);
}

.live-dot {
  width:6px; height:6px; border-radius:50%; background:var(--accent);
  animation:pls 1.8s ease-in-out infinite;
}

@keyframes pls {
  0%,100%{ opacity:1; box-shadow:0 0 0 0 rgba(0,212,255,.5); }
  50%{ opacity:.5; box-shadow:0 0 0 5px rgba(0,212,255,0); }
}

.q-indicator {
  font-family:var(--mono); font-size:11px; color:var(--muted);
  letter-spacing:1.5px; text-transform:uppercase;
}

.nav-btns { display:flex; gap:6px; }

.nav-btn {
  padding:5px 12px; border:1px solid var(--border);
  background:transparent; color:var(--muted); border-radius:6px;
  font-size:11px; cursor:pointer; font-family:var(--body); transition:all .15s;
}
.nav-btn:hover { border-color:var(--accent); color:var(--accent); }

/* ── MAIN ── */
main {
  flex:1; display:flex; flex-direction:column;
  padding:14px 20px 10px;
  position:relative; z-index:1; overflow:hidden;
  min-height:0;
}

.q-text {
  font-family:var(--disp);
  font-size:clamp(15px, 2.8vw, 30px);
  font-weight:700; color:#fff;
  line-height:1.25;
  margin-bottom:18px;
  max-width:88%;
}

/* ── CHART ── */
.chart {
  flex:1; display:flex; flex-direction:column;
  gap:10px; justify-content:center; min-height:0;
}

.bar-row {
  display:grid;
  grid-template-columns: minmax(100px, 22%) 1fr 52px 40px;
  align-items:center; gap:10px;
}

.bar-label {
  font-size:clamp(11px, 1.4vw, 14px);
  color:var(--light); text-align:right;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}

.bar-track {
  height:clamp(28px, 4.5vh, 42px);
  background:rgba(255,255,255,.04);
  border-radius:5px; overflow:hidden;
}

.bar-fill {
  height:100%; width:0; border-radius:5px;
  transition:width .65s cubic-bezier(.34,1.4,.64,1);
  position:relative; overflow:hidden;
}

.bar-fill::after {
  content:''; position:absolute; top:0; left:0; right:0; height:50%;
  background:rgba(255,255,255,.07); border-radius:5px 5px 0 0;
}

.bar-pct {
  font-family:var(--mono); font-size:clamp(11px,1.3vw,13px);
  font-weight:600; color:var(--accent); text-align:right;
}

.bar-cnt {
  font-family:var(--mono); font-size:clamp(9px,1.1vw,11px);
  color:var(--muted); text-align:right;
}

/* ── FOOTER ── */
footer {
  display:flex; align-items:flex-end; justify-content:space-between;
  padding-top:10px;
  border-top:1px solid rgba(255,255,255,.05);
  position:relative; z-index:1; flex-shrink:0;
}

.qr-block { display:flex; align-items:center; gap:12px; }

#qr-wrap {
  width:clamp(64px,9vw,88px); height:clamp(64px,9vw,88px);
  background:#fff; border-radius:8px; padding:4px;
  display:flex; align-items:center; justify-content:center; overflow:hidden; flex-shrink:0;
}
#qr-wrap canvas, #qr-wrap img { max-width:100%; max-height:100%; }

.qr-meta { font-size:clamp(10px,1.2vw,13px); color:var(--light); line-height:1.7; }
.qr-meta strong { font-family:var(--disp); font-size:clamp(12px,1.5vw,15px); color:#fff; display:block; }

.total-block { text-align:right; }

.big-number {
  font-family:var(--mono); font-size:clamp(32px,6vw,56px);
  font-weight:600; color:var(--accent); line-height:1;
}
.big-label {
  font-size:clamp(9px,1vw,11px); color:var(--muted);
  letter-spacing:2px; text-transform:uppercase; margin-top:3px;
}
.updated {
  font-size:10px; color:var(--muted); font-family:var(--mono); margin-top:4px;
}

/* ── ERROR STATE ── */
.config-error {
  position:fixed; inset:0; background:var(--bg); display:flex;
  flex-direction:column; align-items:center; justify-content:center;
  text-align:center; padding:32px; z-index:999;
}
.config-error h2 { font-family:var(--disp); color:var(--amber); margin-bottom:12px; }
.config-error p { color:var(--light); font-size:14px; line-height:1.8; max-width:400px; }
.config-error code { color:var(--accent); font-family:var(--mono); font-size:12px; background:var(--card); padding:2px 6px; border-radius:4px; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="live-badge"><div class="live-dot"></div>LIVE</div>
    <div class="q-indicator" id="q-ind">Q 1 / 1</div>
  </div>
  <div class="nav-btns">
    <button class="nav-btn" onclick="prevQ()">◄</button>
    <button class="nav-btn" onclick="nextQ()">►</button>
  </div>
</header>

<main>
  <div class="q-text" id="q-text">Loading…</div>
  <div class="chart" id="chart"></div>
</main>

<footer>
  <div class="qr-block">
    <div id="qr-wrap"></div>
    <div class="qr-meta">
      <strong>Scan to respond</strong>
      survey.html on your device<br>or via QR code
    </div>
  </div>
  <div class="total-block">
    <div class="big-number" id="total">0</div>
    <div class="big-label">Responses</div>
    <div class="updated" id="updated">—</div>
  </div>
</footer>

<script>
/* ─── Guards ─── */
const needsConfig = FIREBASE_CONFIG.apiKey.startsWith("PASTE");
if (needsConfig) {
  document.body.innerHTML = `
    <div class="config-error">
      <h2>⚙ Setup needed</h2>
      <p>Open <code>presenter.html</code> and paste your Firebase config at the top.<br>
      See <code>README.md</code> for instructions.</p>
    </div>`;
}

/* ─── Firebase ─── */
let R = {};   // { q1: { 0: count, 1: count, … }, … }
let pIdx = 0; // which question is shown

if (!needsConfig) {
  firebase.initializeApp(FIREBASE_CONFIG);
  const db = firebase.database();

  // Real-time listener — fires instantly on any change
  db.ref("responses").on("value", snap => {
    R = snap.val() || {};
    renderChart();
    updateFooter();
  });

  // QR code
  makeQR();

  // Keyboard nav
  document.addEventListener("keydown", e => {
    if (e.key === "ArrowRight" || e.key === "ArrowDown") nextQ();
    if (e.key === "ArrowLeft"  || e.key === "ArrowUp")  prevQ();
  });

  // Initial render
  renderChart();
}

/* ─── Helpers ─── */
const COLORS = [
  "linear-gradient(90deg,#0369a1,#00d4ff)",
  "linear-gradient(90deg,#4c1d95,#7c6fea)",
  "linear-gradient(90deg,#065f46,#3ddc97)",
  "linear-gradient(90deg,#78350f,#f59e0b)",
  "linear-gradient(90deg,#881337,#f43f5e)"
];

function qCounts(id) { return R[id] || {}; }
function qTotal(id)  { return Object.values(qCounts(id)).reduce((a,b)=>a+b, 0); }
function totalResp() { return Math.max(0, ...QUESTIONS.map(q => qTotal(q.id))); }

/* ─── Render chart ─── */
function renderChart() {
  const q = QUESTIONS[pIdx];
  document.getElementById("q-ind").textContent = `Q ${pIdx+1} / ${QUESTIONS.length}`;
  document.getElementById("q-text").textContent = q.text;

  const counts = qCounts(q.id);
  const total  = qTotal(q.id);
  const maxC   = Math.max(...q.options.map((_,i) => counts[i]||0), 1);

  // Build rows with width=0 first, animate after paint
  const chart = document.getElementById("chart");
  chart.innerHTML = q.options.map((opt, i) => `
    <div class="bar-row">
      <div class="bar-label">${opt}</div>
      <div class="bar-track">
        <div class="bar-fill" id="bf${i}" style="background:${COLORS[i%5]};width:0"></div>
      </div>
      <div class="bar-pct" id="bp${i}">0%</div>
      <div class="bar-cnt" id="bc${i}">0</div>
    </div>`).join("");

  requestAnimationFrame(() => requestAnimationFrame(() => {
    q.options.forEach((_, i) => {
      const c   = counts[i] || 0;
      const pct = total > 0 ? Math.round(c / total * 100) : 0;
      const w   = (c / maxC * 100).toFixed(1);
      const bf  = document.getElementById("bf"+i);
      if (bf) bf.style.width = w + "%";
      const bp  = document.getElementById("bp"+i);
      if (bp) bp.textContent = pct + "%";
      const bc  = document.getElementById("bc"+i);
      if (bc) bc.textContent = c;
    });
  }));
}

function updateFooter() {
  document.getElementById("total").textContent = totalResp();
  document.getElementById("updated").textContent =
    "updated " + new Date().toLocaleTimeString([], {hour:"2-digit",minute:"2-digit",second:"2-digit"});
}

/* ─── Navigation ─── */
function prevQ() { if (pIdx > 0) { pIdx--; renderChart(); } }
function nextQ() { if (pIdx < QUESTIONS.length-1) { pIdx++; renderChart(); } }

/* ─── QR Code ─── */
function makeQR() {
  const box = document.getElementById("qr-wrap");
  box.innerHTML = "";
  const size = Math.min(80, box.offsetWidth - 8);
  try {
    new QRCode(box, {
      text: SURVEY_URL,
      width: size, height: size,
      colorDark: "#000", colorLight: "#fff",
      correctLevel: QRCode.CorrectLevel.M
    });
  } catch(e) {
    box.innerHTML = `<div style="font-size:9px;color:#3a5570;text-align:center;padding:6px">Set SURVEY_URL<br>in config</div>`;
  }
}
</script>
</body>
</html>

<body>
 
<header>
  <div style="display:flex;align-items:center;gap:8px;">
    <div class="live-badge"><div class="live-dot"></div>LIVE</div>
    <div class="q-ind" id="q-ind">Q 1 / 1</div>
  </div>
  <div class="nav-btns">
    <button class="nav-btn" onclick="prevQ()">◄</button>
    <button class="nav-btn" onclick="nextQ()">►</button>
  </div>
</header>
 
<main>
  <div class="q-text" id="q-text">Loading…</div>
  <div class="chart" id="chart"></div>
</main>
 
<footer>
  <div class="qr-block">
    <div id="qr-wrap"></div>
    <div class="qr-meta"><strong>Scan to respond</strong>or via QR code</div>
  </div>
  <div class="total-block">
    <div class="big-num" id="total">0</div>
    <div class="big-lbl">Responses</div>
    <div class="status" id="status">connecting…</div>
  </div>
</footer>
 
<script>
var COLORS=[
  "linear-gradient(90deg,#0369a1,#00d4ff)",
  "linear-gradient(90deg,#4c1d95,#7c6fea)",
  "linear-gradient(90deg,#065f46,#3ddc97)",
  "linear-gradient(90deg,#78350f,#f59e0b)",
  "linear-gradient(90deg,#881337,#f43f5e)"
];
 
var R={}, pIdx=0;
 
function qCounts(id){return R[id]||{};}
function qTotal(id){return Object.values(qCounts(id)).reduce(function(a,b){return a+b;},0);}
function totalResp(){return Math.max.apply(null,[0].concat(QUESTIONS.map(function(q){return qTotal(q.id);})));}
 
function renderChart(){
  try{
    var q=QUESTIONS[pIdx];
    document.getElementById("q-ind").textContent="Q "+(pIdx+1)+" / "+QUESTIONS.length;
    document.getElementById("q-text").textContent=q.text;
    var counts=qCounts(q.id), total=qTotal(q.id);
    var maxC=Math.max.apply(null,[1].concat(q.options.map(function(_,i){return counts[i]||0;})));
    var chart=document.getElementById("chart");
    chart.innerHTML=q.options.map(function(opt,i){
      return '<div class="bar-row">'+
        '<div class="bar-label">'+opt+'</div>'+
        '<div class="bar-track"><div class="bar-fill" id="bf'+i+'" style="background:'+COLORS[i%5]+';width:0"></div></div>'+
        '<div class="bar-pct" id="bp'+i+'">0%</div>'+
        '<div class="bar-cnt" id="bc'+i+'">0</div>'+
      '</div>';
    }).join('');
    setTimeout(function(){
      q.options.forEach(function(_,i){
        var c=counts[i]||0;
        var pct=total>0?Math.round(c/total*100):0;
        var w=(c/maxC*100).toFixed(1);
        var bf=document.getElementById("bf"+i);
        if(bf)bf.style.width=w+"%";
        var bp=document.getElementById("bp"+i);
        if(bp)bp.textContent=pct+"%";
        var bc=document.getElementById("bc"+i);
        if(bc)bc.textContent=c;
      });
    },50);
    document.getElementById("total").textContent=totalResp();
  }catch(e){console.error("renderChart:",e);}
}
 
function prevQ(){if(pIdx>0){pIdx--;renderChart();}}
function nextQ(){if(pIdx<QUESTIONS.length-1){pIdx++;renderChart();}}
 
function makeQR(){
  try{
    var box=document.getElementById("qr-wrap");
    box.innerHTML="";
    new QRCode(box,{text:SURVEY_URL,width:64,height:64,colorDark:"#000",colorLight:"#fff",correctLevel:QRCode.CorrectLevel.M});
  }catch(e){console.error("QR:",e);}
}
 
function initFirebase(){
  try{
    firebase.initializeApp(FIREBASE_CONFIG);
    var db=firebase.database();
    document.getElementById("status").textContent="connected";
    db.ref("responses").on("value",function(snap){
      try{
        R=snap.val()||{};
        renderChart();
        document.getElementById("status").textContent="updated "+new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit",second:"2-digit"});
      }catch(e){console.error("snap:",e);}
    },function(err){
      document.getElementById("status").textContent="error: "+err.message;
    });
  }catch(e){
    document.getElementById("status").textContent="firebase error";
    console.error("firebase:",e);
  }
}
 
// Wait for Office.js to be ready, then init
Office.onReady(function(info){
  try{
    makeQR();
    initFirebase();
    renderChart();
    document.addEventListener("keydown",function(e){
      if(e.key==="ArrowRight"||e.key==="ArrowDown")nextQ();
      if(e.key==="ArrowLeft"||e.key==="ArrowUp")prevQ();
    });
  }catch(e){console.error("onReady:",e);}
});
</script>
</body>
</html>

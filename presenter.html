<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="X-UA-Compatible" content="IE=Edge">
<title>LiveSlide</title>
<script>
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyD9I_x5YMYGyjY6-G_syBfQKIqdNZ2yWCo",
  authDomain:        "aaps-survey.firebaseapp.com",
  databaseURL:       "https://aaps-survey-default-rtdb.firebaseio.com",
  projectId:         "aaps-survey",
  storageBucket:     "aaps-survey.firebasestorage.app",
  messagingSenderId: "859652803820",
  appId:             "1:859652803820:web:75b5e37d7035a70c3ae9c9"
};
const SURVEY_BASE = "https://liveslide-cvz.pages.dev/survey.html";
const QUESTIONS = [
  { id:"s1", text:"Sponsor report formats need manual reformatting from LIMS" },
  { id:"s2", text:"QC passes but trends shift after reagent lot changes" },
  { id:"s3", text:"Validation summary tables built from multiple queries by hand" },
  { id:"s4", text:"Assay fails for Analyst A but passes for Analyst B" },
  { id:"s5", text:"Missed TAT due to double-booked instrument" },
  { id:"s6", text:"Long separation limits sample output" },
  { id:"s7", text:"200 analyst-hours/month on chromatogram review" }
];
const OPTIONS = ["AI", "Coding", "Automation"];
const ROLES = [
  { key:"academic",   label:"Academic",         color:"#0ea5e9" },
  { key:"discovery",  label:"Discovery",        color:"#7c6fea" },
  { key:"development", label:"Development",      color:"#3ddc97" },
  { key:"regulated",  label:"Regulated (GxP)",  color:"#f59e0b" },
  { key:"cro",        label:"CRO / Service",    color:"#f43f5e" },
  { key:"operations", label:"Lab Mgmt / Ops",   color:"#14b8a6" }
];
</script>
<script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100%; height:100vh; overflow:hidden;
  font-family:Arial,Helvetica,sans-serif;
  background:#ffffff; color:#0f172a;
  display:flex; flex-direction:column;
}
#setup {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  height:100%; padding:16px; background:#ffffff;
}
#setup h2 { font-size:16px; color:#0f172a; margin-bottom:4px; }
#setup p  { font-size:11px; color:#64748b; margin-bottom:14px; text-align:center; }
.q-btn {
  width:100%; padding:9px 12px; margin-bottom:6px;
  background:#f8fafc; border:1px solid #e2e8f0;
  border-radius:8px; color:#334155; font-size:12px;
  font-family:Arial,Helvetica,sans-serif; cursor:pointer;
  text-align:left; transition:all .15s; line-height:1.4;
}
.q-btn:hover { border-color:#0e7490; background:#ecfeff; color:#0e7490; }

#presenter { display:none; flex-direction:column; height:100%; background:#ffffff; padding:10px 14px; gap:8px; }
.topbar { display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.live-badge {
  display:flex; align-items:center; gap:5px; font-size:10px; color:#0e7490;
  background:rgba(14,116,144,.08); padding:2px 8px; border-radius:20px;
  border:1px solid rgba(14,116,144,.25);
}
.live-dot { width:5px; height:5px; border-radius:50%; background:#0e7490; animation:pls 1.8s ease-in-out infinite; }
@keyframes pls { 0%,100%{opacity:1;} 50%{opacity:.3;} }
.change-btn {
  padding:3px 9px; border:1px solid #cbd5e1; background:transparent;
  color:#94a3b8; border-radius:5px; font-size:10px; cursor:pointer;
  font-family:Arial,Helvetica,sans-serif; transition:all .15s;
}
.change-btn:hover { border-color:#0e7490; color:#0e7490; }
.ver-tag { font-size:9px; color:#cbd5e1; letter-spacing:0.5px; user-select:text; }
.q-text { font-size:clamp(15px,2.4vw,24px); font-weight:700; color:#0f172a; line-height:1.25; flex-shrink:0; }

/* Stacked bars by role */
.chart { flex:1; display:flex; flex-direction:column; justify-content:space-evenly; }
.bar-row { display:grid; grid-template-columns:90px 1fr 48px; align-items:center; gap:10px; }
.bar-label { font-size:clamp(13px,1.6vw,16px); color:#334155; text-align:right; font-weight:600; }
.bar-track { height:clamp(40px,7.5vh,64px); background:#f1f5f9; border-radius:6px; overflow:hidden; display:flex; }
.bar-seg { height:100%; width:0; transition:width .7s cubic-bezier(.34,1.4,.64,1); }
.bar-pct { font-size:clamp(12px,1.4vw,15px); font-weight:700; color:#0e7490; }
.bar-breakdown { grid-column:2 / 3; display:flex; flex-wrap:wrap; gap:3px 10px; margin-top:2px; }
.bd-item { display:flex; align-items:center; gap:3px; font-size:clamp(8px,0.95vw,10px); color:#64748b; }
.bd-dot { width:7px; height:7px; border-radius:2px; flex-shrink:0; }
.bar-block { display:contents; }

/* Legend */
.legend { display:flex; flex-wrap:wrap; gap:8px 14px; padding:2px 0; flex-shrink:0; justify-content:center; }
.leg-item { display:flex; align-items:center; gap:5px; font-size:clamp(9px,1vw,11px); color:#475569; }
.leg-dot { width:10px; height:10px; border-radius:2px; flex-shrink:0; }

.footer { display:flex; align-items:center; justify-content:flex-end; gap:12px; flex-shrink:0; }
#qr-wrap {
  width:clamp(90px,13vw,116px); height:clamp(90px,13vw,116px);
  background:#fff; border:1px solid #e2e8f0; border-radius:8px;
  padding:4px; display:flex; align-items:center; justify-content:center;
  overflow:hidden; flex-shrink:0;
}
#qr-wrap canvas, #qr-wrap img { max-width:100%; max-height:100%; }
.qr-meta { font-size:clamp(10px,1.1vw,12px); color:#64748b; text-align:right; }
.qr-meta strong { font-size:clamp(12px,1.3vw,14px); color:#0f172a; display:block; }
</style>
</head>
<body>
<div id="setup">
  <h2>Which scenario is on this slide?</h2>
  <p>Pick once — this add-in will always show that scenario.</p>
  <div id="q-buttons"></div>
</div>
<div id="presenter">
  <div class="topbar">
    <div class="live-badge"><div class="live-dot"></div>LIVE</div>
    <div style="display:flex;align-items:center;gap:8px;"><span class="ver-tag">v4 · 2026-07-15</span><button class="change-btn" onclick="showSetup()">change scenario</button></div>
  </div>
  <div class="q-text" id="q-text"></div>
  <div class="chart" id="chart"></div>
  <div class="legend" id="legend"></div>
  <div class="footer">
    <div class="qr-meta"><strong>Scan to respond</strong></div>
    <div id="qr-wrap"></div>
  </div>
</div>
<script>
var R={}, activeQ=null, db=null, currentListener=null;

// --- Instant-paint cache -------------------------------------------------
// Office unloads the add-in when the slide is >1 away, so every revisit is a
// cold start. We snapshot the last-known counts locally and paint from them
// immediately, then let Firebase correct us a moment later.
function cacheKey(qId){ return "liveslide_cache_"+qId; }
function loadCache(qId){
  try {
    var raw = localStorage.getItem(cacheKey(qId));
    return raw ? JSON.parse(raw) : null;
  } catch(e){ return null; }
}
function saveCache(qId, data){
  try { localStorage.setItem(cacheKey(qId), JSON.stringify(data||{})); } catch(e){}
}

Office.onReady(function(){
  try { firebase.initializeApp(FIREBASE_CONFIG); db=firebase.database(); } catch(e){ console.error(e); }
  buildSetupButtons();
  buildLegend();
  try {
    var saved=localStorage.getItem("liveslide_question");
    if(saved) selectQuestion(saved); else showSetup();
  } catch(e){ showSetup(); }

  // Force periodic repaint — Office add-ins can freeze rendering during slideshow.
  // This nudges the browser to repaint even when the slideshow is active.
  startRepaintTicker();
});

function startRepaintTicker(){
  var toggle=false;
  setInterval(function(){
    try {
      var p=document.getElementById("presenter");
      if(!p || p.style.display==="none") return;
      // Tiny forced reflow: flip an imperceptible transform to make Office repaint.
      toggle=!toggle;
      p.style.transform = toggle ? "translateZ(0)" : "none";
      // Also re-read a layout property to force reflow.
      void p.offsetHeight;
    } catch(e){}
  }, 1000);
}

function buildSetupButtons(){
  var c=document.getElementById("q-buttons");
  QUESTIONS.forEach(function(q){
    var b=document.createElement("button");
    b.className="q-btn"; b.textContent=q.text;
    b.onclick=function(){ selectQuestion(q.id); };
    c.appendChild(b);
  });
}

function buildLegend(){
  document.getElementById("legend").innerHTML = ROLES.map(function(r){
    return '<div class="leg-item"><div class="leg-dot" style="background:'+r.color+'"></div>'+r.label+'</div>';
  }).join('');
}

function showSetup(){
  document.getElementById("setup").style.display="flex";
  document.getElementById("presenter").style.display="none";
}

function selectQuestion(qId){
  try { localStorage.setItem("liveslide_question",qId); } catch(e){}
  activeQ=QUESTIONS.find(function(q){ return q.id===qId; });
  if(!activeQ){ showSetup(); return; }
  document.getElementById("setup").style.display="none";
  document.getElementById("presenter").style.display="flex";
  document.getElementById("q-text").textContent=activeQ.text;
  if(currentListener&&db) db.ref("responses/"+currentListener).off();
  makeQR(activeQ.id);
  // Paint immediately from cache so bars are on screen before Firebase connects.
  var cached = loadCache(activeQ.id);
  if(cached) R[activeQ.id] = cached;
  renderChart();
  if(db){
    currentListener=activeQ.id;
    db.ref("responses/"+activeQ.id).on("value",function(snap){
      try {
        R[activeQ.id]=snap.val()||{};
        saveCache(activeQ.id, R[activeQ.id]);
        renderChart();
      } catch(e){}
    },function(err){ console.error(err); });
  }
}

// data shape: R[scenario][role][answerIndex] = count
function renderChart(){
  if(!activeQ) return;
  try {
    var data=R[activeQ.id]||{};
    // For each answer option, build role breakdown
    var optTotals=OPTIONS.map(function(_,oi){
      return ROLES.map(function(r){
        return (data[r.key] && data[r.key][oi]) ? data[r.key][oi] : 0;
      });
    });
    // grand total across all answers
    var grand=0;
    optTotals.forEach(function(arr){ arr.forEach(function(v){ grand+=v; }); });
    // max answer total for bar scaling
    var answerSums=optTotals.map(function(arr){ return arr.reduce(function(a,b){return a+b;},0); });
    var maxSum=Math.max.apply(null,[1].concat(answerSums));

    var chart=document.getElementById("chart");
    chart.innerHTML=OPTIONS.map(function(opt,oi){
      var sum=answerSums[oi];
      var pct=grand>0?Math.round(sum/grand*100):0;
      var trackWidth=(sum/maxSum*100).toFixed(1);
      // build segments
      var segs=ROLES.map(function(r,ri){
        var v=optTotals[oi][ri];
        var segW=sum>0?(v/sum*100).toFixed(1):0;
        return '<div class="bar-seg" id="seg'+oi+'_'+ri+'" style="background:'+r.color+';" data-w="'+segW+'"></div>';
      }).join('');
      // build per-role breakdown (only roles with votes)
      var bd=ROLES.map(function(r,ri){
        var v=optTotals[oi][ri];
        if(v===0) return '';
        var rolePct=sum>0?Math.round(v/sum*100):0;
        return '<div class="bd-item"><div class="bd-dot" style="background:'+r.color+'"></div>'+r.label+' '+rolePct+'%</div>';
      }).join('');
      return '<div class="bar-block">'+
        '<div class="bar-row">'+
          '<div class="bar-label">'+opt+'</div>'+
          '<div class="bar-track" id="track'+oi+'" style="width:0%" data-w="'+trackWidth+'">'+segs+'</div>'+
          '<div class="bar-pct">'+pct+'%</div>'+
        '</div>'+
        '<div class="bar-row"><div></div><div class="bar-breakdown">'+bd+'</div><div></div></div>'+
      '</div>';
    }).join('');

    setTimeout(function(){
      OPTIONS.forEach(function(_,oi){
        var track=document.getElementById("track"+oi);
        if(track) track.style.width=track.getAttribute("data-w")+"%";
        ROLES.forEach(function(_,ri){
          var seg=document.getElementById("seg"+oi+"_"+ri);
          if(seg) seg.style.width=seg.getAttribute("data-w")+"%";
        });
      });
    },50);
  } catch(e){ console.error(e); }
}

function makeQR(qId){
  try {
    var box=document.getElementById("qr-wrap"); box.innerHTML="";
    var sz=Math.min(108,box.offsetWidth-8)||100;
    new QRCode(box,{text:SURVEY_BASE+"?s="+qId,width:sz,height:sz,colorDark:"#000",colorLight:"#fff",correctLevel:QRCode.CorrectLevel.M});
  } catch(e){ console.error(e); }
}
</script>
</body>
</html>

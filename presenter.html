<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="X-UA-Compatible" content="IE=Edge">
<title>LiveSlide</title>
 
<script>
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyD9I_x5YMYGyjY6-G_syBfQKIqdNZ2yWCo",
  authDomain:        "aaps-survey.firebaseapp.com",
  databaseURL:       "https://aaps-survey-default-rtdb.firebaseio.com",
  projectId:         "aaps-survey",
  storageBucket:     "aaps-survey.firebasestorage.app",
  messagingSenderId: "859652803820",
  appId:             "1:859652803820:web:75b5e37d7035a70c3ae9c9"
};
 
const SURVEY_URL = "https://reliable-clafoutis-582246.netlify.app/survey.html";
 
const QUESTIONS = [
  { id:"s1", text:"Sponsor report formats need manual reformatting from LIMS" },
  { id:"s2", text:"QC passes but trends shift after reagent lot changes" },
  { id:"s3", text:"Validation summary tables built from multiple queries by hand" },
  { id:"s4", text:"Assay fails for Analyst A but passes for Analyst B" },
  { id:"s5", text:"Missed TAT due to double-booked instrument" },
  { id:"s6", text:"Long separation limits sample output" }
];
 
const OPTIONS = ["AI", "Coding", "Automation"];
 
const COLORS = [
  "linear-gradient(90deg,#0369a1,#00d4ff)",
  "linear-gradient(90deg,#4c1d95,#7c6fea)",
  "linear-gradient(90deg,#065f46,#3ddc97)"
];
</script>
 
<script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
 
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;font-family:'DM Sans',sans-serif;background:transparent !important;color:#e8f0fe;}
body{display:flex;flex-direction:column;}
 
/* ── SETUP SCREEN ── */
#setup{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;padding:24px;
  background:rgba(6,8,15,0.92);
}
#setup h2{font-family:'Syne',sans-serif;font-size:18px;color:#fff;margin-bottom:6px;}
#setup p{font-size:12px;color:#7a9ab5;margin-bottom:20px;text-align:center;}
.q-btn{
  width:100%;padding:10px 16px;margin-bottom:8px;
  background:rgba(255,255,255,.04);border:1px solid #1a2840;
  border-radius:8px;color:#e8f0fe;font-size:13px;font-family:'DM Sans',sans-serif;
  cursor:pointer;text-align:left;transition:all .15s;line-height:1.4;
}
.q-btn:hover{border-color:#00d4ff;background:rgba(0,212,255,.06);color:#fff;}
 
/* ── PRESENTER SCREEN ── */
#presenter{display:none;flex-direction:column;height:100%;}
 
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:7px 14px;border-bottom:1px solid rgba(255,255,255,.07);
  flex-shrink:0;background:transparent;
}
.live-badge{
  display:flex;align-items:center;gap:5px;
  font-family:'JetBrains Mono',monospace;font-size:10px;color:#00d4ff;
  background:rgba(0,212,255,.08);padding:2px 8px;border-radius:20px;
  border:1px solid rgba(0,212,255,.2);
}
.live-dot{width:5px;height:5px;border-radius:50%;background:#00d4ff;animation:pls 1.8s ease-in-out infinite;}
@keyframes pls{0%,100%{opacity:1;}50%{opacity:.3;}}
.change-btn{
  padding:3px 9px;border:1px solid #1a2840;background:transparent;
  color:#3a5570;border-radius:5px;font-size:10px;cursor:pointer;
  font-family:'DM Sans',sans-serif;transition:all .15s;
}
.change-btn:hover{border-color:#00d4ff;color:#00d4ff;}
 
main{flex:1;display:flex;flex-direction:column;padding:12px 16px 8px;min-height:0;}
.q-text{
  font-family:'Syne',sans-serif;
  font-size:clamp(13px,2.4vw,22px);
  font-weight:700;color:#fff;margin-bottom:16px;line-height:1.3;
}
.chart{flex:1;display:flex;flex-direction:column;gap:10px;justify-content:center;}
.bar-row{display:grid;grid-template-columns:90px 1fr 46px;align-items:center;gap:10px;}
.bar-label{font-size:clamp(11px,1.4vw,14px);color:#7a9ab5;text-align:right;font-weight:500;}
.bar-track{height:clamp(28px,4.5vh,44px);background:rgba(255,255,255,.05);border-radius:5px;overflow:hidden;}
.bar-fill{height:100%;width:0;border-radius:5px;transition:width .7s cubic-bezier(.34,1.4,.64,1);position:relative;overflow:hidden;}
.bar-fill::after{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:rgba(255,255,255,.07);border-radius:5px 5px 0 0;}
.bar-pct{font-family:'JetBrains Mono',monospace;font-size:clamp(11px,1.3vw,13px);font-weight:600;color:#00d4ff;}
 
footer{
  display:flex;align-items:center;justify-content:flex-end;
  padding:8px 16px;border-top:1px solid rgba(255,255,255,.05);
  flex-shrink:0;background:transparent;gap:12px;
}
#qr-wrap{
  width:clamp(52px,7vw,68px);height:clamp(52px,7vw,68px);
  background:#fff;border-radius:6px;padding:3px;
  display:flex;align-items:center;justify-content:center;overflow:hidden;
}
#qr-wrap canvas,#qr-wrap img{max-width:100%;max-height:100%;}
.qr-meta{font-size:clamp(9px,1vw,11px);color:#7a9ab5;line-height:1.7;}
.qr-meta strong{font-family:'Syne',sans-serif;font-size:clamp(11px,1.2vw,13px);color:#fff;display:block;}
</style>
</head>
<body>
 
<!-- SETUP SCREEN -->
<div id="setup">
  <h2>Which scenario is on this slide?</h2>
  <p>Pick once — this add-in will always show that scenario.</p>
  <div id="q-buttons"></div>
</div>
 
<!-- PRESENTER SCREEN -->
<div id="presenter">
  <header>
    <div class="live-badge"><div class="live-dot"></div>LIVE</div>
    <button class="change-btn" onclick="showSetup()">change scenario</button>
  </header>
  <main>
    <div class="q-text" id="q-text"></div>
    <div class="chart" id="chart"></div>
  </main>
  <footer>
    <div class="qr-meta"><strong>Scan to respond</strong>or via QR code</div>
    <div id="qr-wrap"></div>
  </footer>
</div>
 
<script>
var R = {}, activeQ = null, db = null, currentListener = null;
 
// ── Office ready ──
Office.onReady(function(){
  try {
    firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.database();
  } catch(e){ console.error("Firebase init:", e); }
 
  makeQR();
  buildSetupButtons();
 
  // Check if a question was previously saved for this instance
  try {
    var saved = localStorage.getItem("liveslide_question");
    if (saved) {
      selectQuestion(saved);
    } else {
      showSetup();
    }
  } catch(e) {
    showSetup();
  }
});
 
// ── Setup ──
function buildSetupButtons(){
  var container = document.getElementById("q-buttons");
  QUESTIONS.forEach(function(q){
    var btn = document.createElement("button");
    btn.className = "q-btn";
    btn.textContent = q.text;
    btn.onclick = function(){ selectQuestion(q.id); };
    container.appendChild(btn);
  });
}
 
function showSetup(){
  document.getElementById("setup").style.display = "flex";
  document.getElementById("presenter").style.display = "none";
}
 
function selectQuestion(qId){
  try { localStorage.setItem("liveslide_question", qId); } catch(e){}
  activeQ = QUESTIONS.find(function(q){ return q.id === qId; });
  if (!activeQ) { showSetup(); return; }
 
  document.getElementById("setup").style.display = "none";
  document.getElementById("presenter").style.display = "flex";
  document.getElementById("q-text").textContent = activeQ.text;
 
  // Detach previous listener
  if (currentListener && db) {
    db.ref("responses/" + currentListener).off();
  }
 
  // Render with current data
  renderChart();
 
  // Listen for real-time updates
  if (db) {
    currentListener = activeQ.id;
    db.ref("responses/" + activeQ.id).on("value", function(snap){
      try {
        R[activeQ.id] = snap.val() || {};
        renderChart();
      } catch(e){ console.error("snap:", e); }
    }, function(err){ console.error("db error:", err); });
  }
}
 
// ── Chart ──
function renderChart(){
  if (!activeQ) return;
  try {
    var counts = R[activeQ.id] || {};
    var total = OPTIONS.reduce(function(a,_,i){ return a + (counts[i]||0); }, 0);
    var maxC = Math.max.apply(null, [1].concat(OPTIONS.map(function(_,i){ return counts[i]||0; })));
 
    var chart = document.getElementById("chart");
    chart.innerHTML = OPTIONS.map(function(opt, i){
      return '<div class="bar-row">' +
        '<div class="bar-label">' + opt + '</div>' +
        '<div class="bar-track"><div class="bar-fill" id="bf'+i+'" style="background:'+COLORS[i]+';width:0"></div></div>' +
        '<div class="bar-pct" id="bp'+i+'">0%</div>' +
      '</div>';
    }).join('');
 
    setTimeout(function(){
      OPTIONS.forEach(function(_, i){
        var c = counts[i] || 0;
        var pct = total > 0 ? Math.round(c / total * 100) : 0;
        var w = (c / maxC * 100).toFixed(1);
        var bf = document.getElementById("bf"+i);
        if (bf) bf.style.width = w + "%";
        var bp = document.getElementById("bp"+i);
        if (bp) bp.textContent = pct + "%";
      });
    }, 50);
  } catch(e){ console.error("renderChart:", e); }
}
 
// ── QR ──
function makeQR(){
  try {
    var box = document.getElementById("qr-wrap");
    box.innerHTML = "";
    new QRCode(box, {text: SURVEY_URL, width: 62, height: 62, colorDark: "#000", colorLight: "#fff", correctLevel: QRCode.CorrectLevel.M});
  } catch(e){ console.error("QR:", e); }
}
</script>
</body>
</html>

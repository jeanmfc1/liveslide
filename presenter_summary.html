<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="X-UA-Compatible" content="IE=Edge">
<title>LiveSlide Summary</title>
<script>
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyD9I_x5YMYGyjY6-G_syBfQKIqdNZ2yWCo",
  authDomain:        "aaps-survey.firebaseapp.com",
  databaseURL:       "https://aaps-survey-default-rtdb.firebaseio.com",
  projectId:         "aaps-survey",
  storageBucket:     "aaps-survey.firebasestorage.app",
  messagingSenderId: "859652803820",
  appId:             "1:859652803820:web:75b5e37d7035a70c3ae9c9"
};
const QUESTIONS = [
  { id:"s1", text:"Sponsor report formats need manual reformatting from LIMS" },
  { id:"s2", text:"QC passes but trends shift after reagent lot changes" },
  { id:"s3", text:"Validation summary tables built from multiple queries by hand" },
  { id:"s4", text:"Assay fails for Analyst A but passes for Analyst B" },
  { id:"s5", text:"Missed TAT due to double-booked instrument" },
  { id:"s6", text:"Long separation limits sample output" }
];
const OPTIONS = ["AI", "Coding", "Automation"];
const COLORS = [
  "linear-gradient(90deg,#0369a1,#00d4ff)",
  "linear-gradient(90deg,#4c1d95,#7c6fea)",
  "linear-gradient(90deg,#065f46,#3ddc97)"
];
</script>
<script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100%; height:100vh; overflow:hidden;
  font-family:'Century Gothic',Futura,'Trebuchet MS',sans-serif;
  background:#ffffff; color:#0f172a;
  display:flex; flex-direction:column;
}

.topbar {
  display:flex; align-items:center;
  padding:5px 10px; flex-shrink:0;
}
.live-badge {
  display:flex; align-items:center; gap:5px;
  font-size:10px; color:#0e7490;
  background:rgba(14,116,144,.08); padding:2px 8px; border-radius:20px;
  border:1px solid rgba(14,116,144,.25);
}
.live-dot { width:5px; height:5px; border-radius:50%; background:#0e7490; animation:pls 1.8s ease-in-out infinite; }
@keyframes pls { 0%,100%{opacity:1;} 50%{opacity:.3;} }

.grid {
  flex:1;
  display:grid;
  grid-template-columns:1fr 1fr;
  grid-template-rows:1fr 1fr 1fr;
  gap:6px;
  padding:4px 8px 8px;
  min-height:0;
}

.card {
  display:flex; flex-direction:column;
  background:#f8fafc; border-radius:8px;
  padding:8px 10px; overflow:hidden; min-height:0;
}

.card-title {
  font-size:clamp(11px,1.3vw,14px);
  font-weight:700; color:#0f172a;
  line-height:1.2; margin-bottom:6px; flex-shrink:0;
}

.bars {
  flex:1; display:flex; flex-direction:column;
  justify-content:space-evenly; min-height:0;
}

.bar-row {
  display:grid;
  grid-template-columns:62px 1fr 38px;
  align-items:center; gap:6px;
}

.bar-label {
  font-size:clamp(10px,1.1vw,13px);
  color:#334155; text-align:right; font-weight:600;
}

.bar-track {
  height:clamp(14px,2.8vh,26px);
  background:#e2e8f0; border-radius:4px; overflow:hidden;
}

.bar-fill {
  height:100%; width:0; border-radius:4px;
  transition:width .7s cubic-bezier(.34,1.4,.64,1);
}

.bar-pct {
  font-size:clamp(10px,1.1vw,13px);
  font-weight:700; color:#0e7490;
}
</style>
</head>
<body>

<div class="topbar">
  <div class="live-badge"><div class="live-dot"></div>LIVE — ALL SCENARIOS</div>
</div>

<div class="grid" id="grid"></div>

<script>
var R = {}, db = null;

Office.onReady(function(){
  try {
    firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.database();
  } catch(e){ console.error(e); }

  buildGrid();

  if(db){
    db.ref("responses").on("value", function(snap){
      try { R = snap.val() || {}; renderAll(); } catch(e){}
    }, function(err){ console.error(err); });
  }
});

function buildGrid(){
  var grid = document.getElementById("grid");
  grid.innerHTML = QUESTIONS.map(function(q, qi){
    var bars = OPTIONS.map(function(opt, i){
      return '<div class="bar-row">'+
        '<div class="bar-label">'+opt+'</div>'+
        '<div class="bar-track"><div class="bar-fill" id="f'+qi+'_'+i+'" style="background:'+COLORS[i]+'"></div></div>'+
        '<div class="bar-pct" id="p'+qi+'_'+i+'">0%</div>'+
      '</div>';
    }).join('');
    return '<div class="card">'+
      '<div class="card-title">'+q.text+'</div>'+
      '<div class="bars">'+bars+'</div>'+
    '</div>';
  }).join('');
}

function renderAll(){
  QUESTIONS.forEach(function(q, qi){
    var counts = R[q.id] || {};
    var total = OPTIONS.reduce(function(a,_,i){ return a+(counts[i]||0); }, 0);
    var maxC = Math.max.apply(null,[1].concat(OPTIONS.map(function(_,i){ return counts[i]||0; })));
    OPTIONS.forEach(function(_, i){
      var c = counts[i]||0;
      var pct = total>0 ? Math.round(c/total*100) : 0;
      var w = (c/maxC*100).toFixed(1);
      var f = document.getElementById("f"+qi+"_"+i);
      if(f) f.style.width = w+"%";
      var p = document.getElementById("p"+qi+"_"+i);
      if(p) p.textContent = pct+"%";
    });
  });
}
</script>
</body>
</html>

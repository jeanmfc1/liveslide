<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="X-UA-Compatible" content="IE=Edge">
<title>LiveSlide Summary</title>
<script>
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyD9I_x5YMYGyjY6-G_syBfQKIqdNZ2yWCo",
  authDomain:        "aaps-survey.firebaseapp.com",
  databaseURL:       "https://aaps-survey-default-rtdb.firebaseio.com",
  projectId:         "aaps-survey",
  storageBucket:     "aaps-survey.firebasestorage.app",
  messagingSenderId: "859652803820",
  appId:             "1:859652803820:web:75b5e37d7035a70c3ae9c9"
};
const QUESTIONS = [
  { id:"s1", short:"Sponsor report reformatting" },
  { id:"s2", short:"QC trends after lot changes" },
  { id:"s3", short:"Validation tables by hand" },
  { id:"s4", short:"Analyst A vs B discrepancy" },
  { id:"s5", short:"Missed TAT (instrument)" },
  { id:"s6", short:"Long separation / throughput" },
  { id:"s7", short:"200 hrs/mo chromatogram review" }
];
const OPTIONS = ["AI", "Coding", "Automation"];
const OPT_SHORT = ["AI", "Cod", "Aut"];
// Correct answer index per scenario (0=AI, 1=Coding, 2=Automation)
const CORRECT = { s1:1, s2:0, s3:1, s4:2, s5:1, s6:2, s7:0 };
const ROLES = [
  { key:"academic",   label:"Academic",              rgb:"42,120,214" },
  { key:"discovery",  label:"Industry — Discovery",  rgb:"27,175,122" },
  { key:"development", label:"Industry — Development", rgb:"237,161,0" },
  { key:"regulated",  label:"Industry — Regulated",  rgb:"74,58,167" },
  { key:"cro",        label:"CRO / Service Lab",     rgb:"227,73,72" },
  { key:"operations", label:"Lab Management / Ops",  rgb:"25,158,112" }
];
</script>
<script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100%; height:100vh; overflow:hidden;
  font-family:Arial,Helvetica,sans-serif;
  background:#ffffff; color:#0f172a;
  display:flex; flex-direction:column;
}
.topbar { display:flex; align-items:center; padding:6px 12px 4px; flex-shrink:0; }
.live-badge {
  display:flex; align-items:center; gap:5px; font-size:10px; color:#0e7490;
  background:rgba(14,116,144,.08); padding:2px 8px; border-radius:20px;
  border:1px solid rgba(14,116,144,.25);
}
.live-dot { width:5px; height:5px; border-radius:50%; background:#0e7490; animation:pls 1.8s ease-in-out infinite; }
@keyframes pls { 0%,100%{opacity:1;} 50%{opacity:.3;} }

/* 3 x 2 grid of role cards */
.role-grid {
  flex:1;
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  grid-template-rows:1fr 1fr;
  gap:8px;
  padding:4px 10px 10px;
  min-height:0;
}
.role-card {
  display:flex; flex-direction:column;
  background:#f8fafc; border-radius:8px;
  padding:8px 10px; overflow:hidden; min-height:0;
}
.role-name {
  font-size:clamp(10px,1.2vw,13px); font-weight:700;
  margin-bottom:5px; flex-shrink:0;
  padding-bottom:4px; border-bottom:0.5px solid #e2e8f0;
}
.mini {
  flex:1; display:grid;
  grid-template-columns:1.7fr 1fr 1fr 1fr;
  gap:2px; min-height:0;
}
.mini-corner {}
.mini-colhead {
  display:flex; align-items:center; justify-content:center;
  font-size:clamp(8px,0.95vw,10px); color:#64748b; font-weight:600;
}
.mini-rowhead {
  display:flex; align-items:center;
  font-size:clamp(8px,0.9vw,10px); color:#475569;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.mini-cell {
  display:flex; align-items:center; justify-content:center;
  border-radius:3px; font-size:clamp(8px,0.95vw,11px); font-weight:700;
  color:#0f172a; transition:background .5s, color .5s;
}
.mini-cell.correct {
  box-shadow:0 0 0 2px #16a34a;
  border-radius:3px;
}
</style>
</head>
<body>
<div class="topbar">
  <div class="live-badge"><div class="live-dot"></div>LIVE — BY ROLE</div>
</div>
<div class="role-grid" id="role-grid"></div>
<script>
var R={}, db=null;

Office.onReady(function(){
  try { firebase.initializeApp(FIREBASE_CONFIG); db=firebase.database(); } catch(e){ console.error(e); }
  buildGrid();
  if(db){
    db.ref("responses").on("value",function(snap){
      try { R=snap.val()||{}; renderAll(); } catch(e){}
    },function(err){ console.error(err); });
  }
});

function buildGrid(){
  var grid=document.getElementById("role-grid");
  grid.innerHTML=ROLES.map(function(role){
    var head='<div class="mini-corner"></div>'+
      OPT_SHORT.map(function(o){ return '<div class="mini-colhead">'+o+'</div>'; }).join('');
    var rows=QUESTIONS.map(function(q,qi){
      var cells=OPTIONS.map(function(_,oi){
        var isCorrect = CORRECT[q.id]===oi ? " correct" : "";
        return '<div class="mini-cell'+isCorrect+'" id="c_'+role.key+'_'+qi+'_'+oi+'">0</div>';
      }).join('');
      return '<div class="mini-rowhead" title="'+q.short+'">'+q.short+'</div>'+cells;
    }).join('');
    return '<div class="role-card">'+
      '<div class="role-name" style="color:rgb('+role.rgb+')">'+role.label+'</div>'+
      '<div class="mini">'+head+rows+'</div>'+
    '</div>';
  }).join('');
}

function renderAll(){
  ROLES.forEach(function(role){
    QUESTIONS.forEach(function(q,qi){
      var data=(R[q.id] && R[q.id][role.key]) ? R[q.id][role.key] : {};
      var total=OPTIONS.reduce(function(a,_,oi){ return a+(data[oi]||0); },0);
      OPTIONS.forEach(function(_,oi){
        var c=data[oi]||0;
        var pct=total>0?Math.round(c/total*100):0;
        var cell=document.getElementById("c_"+role.key+"_"+qi+"_"+oi);
        if(cell){
          var alpha=total>0?(0.08+0.92*(pct/100)):0.04;
          cell.style.background="rgba("+role.rgb+","+alpha.toFixed(2)+")";
          cell.style.color = pct>55 ? "#fff" : "#0f172a";
          cell.textContent = total>0 ? pct+"%" : "–";
        }
      });
    });
  });
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Live Survey</title>
<script>
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyD9I_x5YMYGyjY6-G_syBfQKIqdNZ2yWCo",
  authDomain:        "aaps-survey.firebaseapp.com",
  databaseURL:       "https://aaps-survey-default-rtdb.firebaseio.com",
  projectId:         "aaps-survey",
  storageBucket:     "aaps-survey.firebasestorage.app",
  messagingSenderId: "859652803820",
  appId:             "1:859652803820:web:75b5e37d7035a70c3ae9c9"
};
const QUESTIONS = [
  { id:"s1", text:"Sponsor report formats need manual reformatting from LIMS" },
  { id:"s2", text:"QC passes but trends shift after reagent lot changes" },
  { id:"s3", text:"Validation summary tables built from multiple queries by hand" },
  { id:"s4", text:"Assay fails for Analyst A but passes for Analyst B" },
  { id:"s5", text:"Missed TAT due to double-booked instrument" },
  { id:"s6", text:"Long separation limits sample output" },
  { id:"s7", text:"200 analyst-hours/month on chromatogram review" }
];
const OPTIONS = ["AI", "Coding", "Automation"];
const ROLES = [
  { key:"academic",   label:"Academic" },
  { key:"discovery",  label:"Industry — Discovery" },
  { key:"development", label:"Industry — Development" },
  { key:"regulated",  label:"Industry — Regulated (GxP)" },
  { key:"cro",        label:"CRO / Service Lab" },
  { key:"operations", label:"Lab Management / Operations" }
];
</script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{min-height:100%;font-family:Arial,Helvetica,sans-serif;background:#f1f5f9;color:#0f172a;}
body{display:flex;align-items:center;justify-content:center;padding:20px;min-height:100vh;}
.card{background:#fff;border-radius:20px;padding:clamp(28px,5vw,40px);max-width:440px;width:100%;box-shadow:0 20px 60px rgba(15,23,42,.1);}
.q-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:#64748b;margin-bottom:10px;}
.q-text{font-size:clamp(18px,4vw,23px);font-weight:700;color:#0f172a;line-height:1.35;margin-bottom:22px;}
.options{display:flex;flex-direction:column;gap:10px;}
.opt{
  display:flex;align-items:center;gap:14px;
  padding:15px 18px;border:2px solid #e2e8f0;border-radius:13px;
  background:#fff;cursor:pointer;font-size:15px;
  font-family:Arial,Helvetica,sans-serif;
  transition:all .15s;text-align:left;width:100%;font-weight:500;color:#334155;
}
.opt:hover{border-color:#0e7490;background:#ecfeff;color:#0e7490;}
.opt.submitted{border-color:#16a34a;background:#f0fdf4;color:#16a34a;cursor:default;pointer-events:none;}
.opt-letter{width:30px;height:30px;border-radius:50%;background:#e2e8f0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;transition:all .15s;}
.opt.submitted .opt-letter{background:#16a34a;color:#fff;}
.done-msg{margin-top:20px;text-align:center;display:none;}
.done-msg.vis{display:block;}
.done-icon{font-size:48px;margin-bottom:10px;line-height:1;}
.done-title{font-size:22px;font-weight:700;color:#0f172a;}
.done-sub{color:#64748b;font-size:14px;margin-top:6px;line-height:1.6;}
.change-role-link{display:inline-block;margin-top:18px;font-size:12px;color:#94a3b8;text-decoration:underline;cursor:pointer;}
.change-role-link:hover{color:#0e7490;}
</style>
</head>
<body>
<div class="card">
  <div id="q-area">
    <div class="q-label" id="q-label"></div>
    <div class="q-text" id="q-text">Loading…</div>
    <div class="options" id="options"></div>
  </div>
  <div class="done-msg" id="done-msg">
    <div class="done-icon">✅</div>
    <div class="done-title">Response recorded!</div>
    <div class="done-sub">Watch the live results<br>on the presentation screen.</div>
    <a class="change-role-link" onclick="changeRole()">change role &amp; test again</a>
  </div>
</div>
<script>
var db, activeQ=null, stage="role", myRole=null, submitted=false;

firebase.initializeApp(FIREBASE_CONFIG);
db=firebase.database();

var urlParams=new URLSearchParams(window.location.search);
var scenarioId=urlParams.get('s');
activeQ=QUESTIONS.find(function(q){return q.id===scenarioId;}) || QUESTIONS[0];

// Check if role already chosen this session
try {
  var savedRole=localStorage.getItem("liveslide_role");
  if(savedRole){ myRole=savedRole; stage="scenario"; }
} catch(e){}

renderStage();

function renderStage(){
  if(stage==="role") renderRole();
  else renderScenario();
}

function renderRole(){
  document.getElementById("q-label").textContent="First, tell us about yourself";
  document.getElementById("q-text").textContent="What best describes you?";
  document.getElementById("options").innerHTML=ROLES.map(function(r,i){
    return '<button class="opt" onclick="pickRole(\''+r.key+'\')">'+
      '<span class="opt-letter">'+(i+1)+'</span>'+r.label+
    '</button>';
  }).join('');
}

function pickRole(roleKey){
  myRole=roleKey;
  try { localStorage.setItem("liveslide_role", roleKey); } catch(e){}
  stage="scenario";
  renderStage();
}

function renderScenario(){
  document.getElementById("q-label").textContent="How would you respond?";
  document.getElementById("q-text").textContent=activeQ.text;
  document.getElementById("options").innerHTML=OPTIONS.map(function(opt,i){
    return '<button class="opt" onclick="pickAnswer('+i+')">'+
      '<span class="opt-letter">'+"ABC"[i]+'</span>'+opt+
    '</button>';
  }).join('');
}

function changeRole(){
  try { localStorage.removeItem("liveslide_role"); } catch(e){}
  myRole=null; stage="role"; submitted=false;
  document.getElementById("done-msg").classList.remove("vis");
  document.getElementById("q-area").style.display="block";
  renderStage();
}

function pickAnswer(i){
  if(submitted) return;
  submitted=true;
  // Store as responses/{scenario}/{role}/{answerIndex}
  db.ref("responses/"+activeQ.id+"/"+myRole+"/"+i).transaction(function(cur){return (cur||0)+1;});
  var opts=document.querySelectorAll(".opt");
  opts.forEach(function(o,idx){
    if(idx===i) o.classList.add("submitted");
    else o.style.opacity="0.35";
  });
  opts[i].querySelector(".opt-letter").textContent="✓";
  setTimeout(function(){
    document.getElementById("q-area").style.display="none";
    document.getElementById("done-msg").classList.add("vis");
  },800);
}
</script>
</body>
</html>

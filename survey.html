<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Live Survey</title>

<!-- ════════════════════════════════════════════════
     ⚠️  CONFIGURATION — Keep identical to presenter.html
     ════════════════════════════════════════════════ -->
<script>
  // 1. Same Firebase config as presenter.html
  const FIREBASE_CONFIG = {
    apiKey: "AIzaSyD9I_x5YMYGyjY6-G_syBfQKIqdNZ2yWCo",
    authDomain: "aaps-survey.firebaseapp.com",
    databaseURL: "https://aaps-survey-default-rtdb.firebaseio.com",
    projectId: "aaps-survey",
    storageBucket: "aaps-survey.firebasestorage.app",
    messagingSenderId: "859652803820",
    appId: "1:859652803820:web:75b5e37d7035a70c3ae9c9"
  };

  // 2. Same questions as presenter.html
  const QUESTIONS = [
    {
      id: "q1",
      text: "How would you rate today's session?",
      options: ["⭐ Poor", "⭐⭐ Fair", "⭐⭐⭐ Good", "⭐⭐⭐⭐ Great", "⭐⭐⭐⭐⭐ Excellent"]
    },
    {
      id: "q2",
      text: "Which topic was most valuable?",
      options: ["Strategy & Roadmap", "Technology & Tools", "Data & Analytics", "Team Collaboration"]
    },
    {
      id: "q3",
      text: "Would you recommend this event?",
      options: ["Definitely yes", "Probably yes", "Not sure", "Probably not"]
    }
  ];
</script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --ink:     #0f172a;
  --sub:     #475569;
  --border:  #e2e8f0;
  --bg:      #f1f5f9;
  --accent:  #0e7490;
  --accent-l:#ecfeff;
  --green:   #16a34a;
  --body:    'DM Sans', sans-serif;
  --disp:    'Syne', sans-serif;
}

html, body {
  min-height:100%; width:100%;
  font-family:var(--body);
  background:var(--bg);
  color:var(--ink);
}

body {
  display:flex; align-items:center; justify-content:center;
  padding:20px;
}

.card {
  background:#fff; border-radius:22px;
  padding:clamp(28px,5vw,44px);
  max-width:460px; width:100%;
  box-shadow:0 20px 60px rgba(15,23,42,.1), 0 4px 16px rgba(15,23,42,.06);
}

/* Progress */
.progress { display:flex; gap:6px; margin-bottom:26px; }
.prog-dot {
  height:4px; flex:1; border-radius:2px; background:var(--border);
  transition:background .4s;
}
.prog-dot.done   { background:var(--accent); }
.prog-dot.active { background:#22d3ee; }

/* Question */
.q-label {
  font-size:11px; font-weight:600; text-transform:uppercase;
  letter-spacing:1.5px; color:var(--sub); margin-bottom:10px;
}
.q-text {
  font-family:var(--disp); font-size:clamp(18px,4vw,24px);
  font-weight:700; color:var(--ink); line-height:1.3; margin-bottom:22px;
}

/* Options */
.options { display:flex; flex-direction:column; gap:10px; }

.opt {
  display:flex; align-items:center; gap:14px;
  padding:13px 16px;
  border:2px solid var(--border); border-radius:13px;
  background:#fff; cursor:pointer;
  font-size:15px; font-family:var(--body);
  transition:all .15s ease; text-align:left; width:100%;
}
.opt:hover  { border-color:var(--accent); background:var(--accent-l); color:var(--accent); }
.opt.sel    { border-color:var(--accent); background:var(--accent-l); color:var(--accent); font-weight:500; }

.opt-letter {
  width:26px; height:26px; border-radius:50%;
  background:var(--border); flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-size:11px; font-weight:700; font-family:'DM Sans',sans-serif;
  transition:all .15s;
}
.opt.sel .opt-letter { background:var(--accent); color:#fff; }

/* Next button */
.next-btn {
  margin-top:18px; width:100%; padding:16px;
  background:linear-gradient(135deg, #0e7490, #22d3ee);
  border:none; border-radius:13px; color:#fff;
  font-size:16px; font-weight:600; font-family:var(--body);
  cursor:pointer; transition:opacity .15s;
  display:none;
}
.next-btn.vis { display:block; }
.next-btn:hover { opacity:.9; }

/* Thank you */
.thanks {
  text-align:center; padding:10px 0;
  display:none;
}
.thanks.vis { display:block; }
.thanks-icon { font-size:64px; margin-bottom:14px; line-height:1; }
.thanks-title { font-family:var(--disp); font-size:28px; font-weight:700; color:var(--ink); }
.thanks-sub   { color:var(--sub); font-size:15px; margin-top:8px; line-height:1.6; }

.again-btn {
  margin-top:22px; padding:11px 22px;
  background:var(--bg); border:none; border-radius:10px;
  color:var(--sub); cursor:pointer; font-size:13px; font-family:var(--body);
}

/* Error */
.error-banner {
  background:#fef3c7; border:1px solid #f59e0b;
  border-radius:10px; padding:12px 16px;
  font-size:13px; color:#92400e; margin-bottom:16px;
  display:none;
}
.error-banner.vis { display:block; }
</style>
</head>
<body>

<div class="card">
  <div class="error-banner" id="err"></div>
  <div class="progress" id="progress"></div>

  <div id="q-area">
    <div class="q-label" id="q-label">Question 1</div>
    <div class="q-text" id="q-text">Loading…</div>
    <div class="options" id="options"></div>
    <button class="next-btn" id="next-btn" onclick="submitAndAdvance()">Next →</button>
  </div>

  <div class="thanks" id="thanks">
    <div class="thanks-icon">🎉</div>
    <div class="thanks-title">Thank you!</div>
    <div class="thanks-sub">Your response has been recorded<br>and the results are updating live.</div>
    <button class="again-btn" onclick="restart()">Take it again</button>
  </div>
</div>

<script>
const LETTERS = "ABCDEFGH";
let db;
let sIdx = 0;     // current question index
let picks = {};   // { qId: optionIndex }

/* ─── Init Firebase ─── */
const needsConfig = FIREBASE_CONFIG.apiKey.startsWith("PASTE");
if (needsConfig) {
  showErr("Firebase not configured yet. See README.md for setup instructions.");
} else {
  firebase.initializeApp(FIREBASE_CONFIG);
  db = firebase.database();
  renderQ();
}

/* ─── Render current question ─── */
function renderQ() {
  if (sIdx >= QUESTIONS.length) {
    document.getElementById("q-area").style.display = "none";
    document.getElementById("thanks").classList.add("vis");
    return;
  }

  document.getElementById("q-area").style.display = "block";
  document.getElementById("thanks").classList.remove("vis");

  const q = QUESTIONS[sIdx];

  // Progress dots
  document.getElementById("progress").innerHTML =
    QUESTIONS.map((_, i) => `<div class="prog-dot ${i<sIdx?"done":i===sIdx?"active":""}"></div>`).join("");

  document.getElementById("q-label").textContent = `Question ${sIdx+1} of ${QUESTIONS.length}`;
  document.getElementById("q-text").textContent = q.text;

  // Options
  document.getElementById("options").innerHTML = q.options.map((opt, i) => `
    <button class="opt ${picks[q.id]===i?"sel":""}" onclick="pick(${i})">
      <span class="opt-letter">${LETTERS[i]}</span>
      ${opt}
    </button>`).join("");

  // Next button
  const nxt = document.getElementById("next-btn");
  if (picks[q.id] !== undefined) {
    nxt.classList.add("vis");
    nxt.textContent = sIdx < QUESTIONS.length - 1 ? "Next →" : "Submit ✓";
  } else {
    nxt.classList.remove("vis");
  }
}

/* ─── Pick an option ─── */
function pick(i) {
  picks[QUESTIONS[sIdx].id] = i;
  renderQ();
}

/* ─── Submit & advance ─── */
async function submitAndAdvance() {
  const q   = QUESTIONS[sIdx];
  const sel = picks[q.id];
  if (sel === undefined) return;

  // Atomic increment in Firebase
  const ref = db.ref(`responses/${q.id}/${sel}`);
  try {
    await ref.transaction(cur => (cur || 0) + 1);
  } catch(e) {
    showErr("Couldn't save response — check your internet connection.");
    return;
  }

  sIdx++;
  renderQ();
}

/* ─── Restart ─── */
function restart() {
  sIdx  = 0;
  picks = {};
  renderQ();
}

/* ─── Error helper ─── */
function showErr(msg) {
  const el = document.getElementById("err");
  el.textContent = msg;
  el.classList.add("vis");
}
</script>
</body>
</html>
